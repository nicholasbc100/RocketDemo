<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Florida to Moon Rocket Demo</title>
  <style>
    :root {
      --bg: #050816;
      --panel: rgba(8, 14, 36, 0.86);
      --text: #e8f0ff;
      --accent: #49d2ff;
      --warn: #ffb347;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(circle at 20% 20%, #13254f, var(--bg) 45%);
      color: var(--text);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      touch-action: none;
      overscroll-behavior: none;
    }
    .app {
      width: min(100vw, 860px);
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      padding: 10px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid rgba(136, 177, 255, 0.24);
      border-radius: 14px;
      padding: 10px 12px;
      backdrop-filter: blur(3px);
    }
    h1 {
      margin: 0 0 6px;
      font-size: 1rem;
      letter-spacing: 0.02em;
    }
    .hud {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      font-size: 0.85rem;
    }
    .metric { background: rgba(255, 255, 255, 0.06); border-radius: 10px; padding: 7px; }
    .metric .label { opacity: 0.75; display: block; font-size: 0.72rem; }
    .metric .value { font-weight: 700; }
    canvas {
      width: 100%;
      height: 100%;
      border-radius: 14px;
      border: 1px solid rgba(136, 177, 255, 0.24);
      background: linear-gradient(#07102d 0%, #090f27 70%, #0e1731 100%);
      display: block;
    }
    .controls {
      display: grid;
      gap: 10px;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .row.single { grid-template-columns: 1fr; }
    button {
      border: 1px solid rgba(121, 177, 255, 0.35);
      border-radius: 12px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.07);
      min-height: 46px;
      font-weight: 600;
      font-size: 0.95rem;
    }
    button:active, button.active { background: rgba(73, 210, 255, 0.25); }
    .slider-wrap { display: grid; gap: 4px; }
    input[type='range'] { width: 100%; }
    .status { color: var(--warn); font-size: 0.87rem; min-height: 1.2em; }
  </style>
</head>
<body>
  <div class="app">
    <div class="panel">
      <h1>🚀 Florida → Moon (Mobile Demo)</h1>
      <div class="hud">
        <div class="metric"><span class="label">Altitude</span><span class="value" id="altitude">0 km</span></div>
        <div class="metric"><span class="label">Speed</span><span class="value" id="speed">0 m/s</span></div>
        <div class="metric"><span class="label">Fuel</span><span class="value" id="fuel">100%</span></div>
        <div class="metric"><span class="label">Score</span><span class="value" id="score">0</span></div>
        <div class="metric"><span class="label">Objective</span><span class="value" id="objective">Launch</span></div>
        <div class="metric"><span class="label">Mode</span><span class="value" id="mode">Ready</span></div>
      </div>
    </div>

    <canvas id="game" width="900" height="1200" aria-label="Rocket simulation"></canvas>

    <div class="panel controls">
      <div class="status" id="status">Tap Launch, then use Left/Right + Throttle to reach the moon.</div>
      <div class="row">
        <button id="left">⟲ Left</button>
        <button id="autopilot">Autopilot: Off</button>
        <button id="right">Right ⟳</button>
      </div>
      <div class="row">
        <button id="launch">Launch</button>
        <button id="reset">Reset</button>
        <button id="boost">Boost +25%</button>
      </div>
      <div class="row single">
        <button id="shoot">Shoot Meteor (X)</button>
      </div>
      <div class="slider-wrap">
        <label for="throttle">Throttle</label>
        <input id="throttle" type="range" min="0" max="100" value="70" />
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const ui = {
      altitude: document.getElementById('altitude'),
      speed: document.getElementById('speed'),
      fuel: document.getElementById('fuel'),
      score: document.getElementById('score'),
      objective: document.getElementById('objective'),
      mode: document.getElementById('mode'),
      status: document.getElementById('status'),
      throttle: document.getElementById('throttle')
    };

    const state = {
      launched: false,
      autopilot: false,
      throttle: 0.7,
      controls: { left: false, right: false },
      score: 0,
      combo: 1,
      mission: 'Launch',
      rocket: null,
      moon: null,
      earth: null,
      pickups: [],
      meteors: [],
      shots: [],
      shootCooldown: 0,
      stars: Array.from({ length: 120 }, () => ({ x: Math.random() * 900, y: Math.random() * 1200, s: Math.random() * 2 + 0.4 }))
    };
    // Cap frame time to keep physics stable during rendering stalls (max 0.033s per step, ~30 FPS minimum).
    const MAX_FRAME_TIME = 0.033;
    // Ignore near-zero steps to avoid unnecessary physics updates when frame delta is effectively zero.
    const MIN_PHYSICS_DT = 0.0001;

    function clamp01(value) {
      if (!Number.isFinite(value)) return 0;
      return Math.max(0, Math.min(1, value));
    }

    function setThrottle(value) {
      state.throttle = clamp01(value);
      ui.throttle.value = Math.round(state.throttle * 100);
    }

    // Guard against corrupted numeric state (NaN/Infinity) before running launch/physics/HUD math.
    function hasValidRocketKinematics(rocket) {
      return rocket
        && typeof rocket === 'object'
        && Number.isFinite(rocket.x)
        && Number.isFinite(rocket.y)
        && Number.isFinite(rocket.vx)
        && Number.isFinite(rocket.vy)
        && Number.isFinite(rocket.angle);
    }

    function hasValidMoonState(moon) {
      return moon
        && typeof moon === 'object'
        && Number.isFinite(moon.x)
        && Number.isFinite(moon.y)
        && Number.isFinite(moon.r)
        && moon.r > 0;
    }

    function clampFrameTime(rawDt) {
      if (!Number.isFinite(rawDt)) return 0;
      return Math.min(MAX_FRAME_TIME, Math.max(0, rawDt));
    }

    function createPickups() {
      state.pickups = Array.from({ length: 8 }, (_, i) => ({
        x: 250 + Math.random() * 560,
        y: 180 + i * 95 + Math.random() * 55,
        r: 11 + Math.random() * 5,
        pulse: Math.random() * Math.PI * 2,
        taken: false
      }));
    }

    function createEarthTexture() {
      return {
        x: 90,
        y: 1180,
        r: 250,
        bands: Array.from({ length: 6 }, () => ({
          y: -170 + Math.random() * 330,
          h: 16 + Math.random() * 22,
          a: 0.08 + Math.random() * 0.12
        })),
        continents: Array.from({ length: 9 }, () => ({
          x: -130 + Math.random() * 260,
          y: -170 + Math.random() * 260,
          rx: 26 + Math.random() * 55,
          ry: 14 + Math.random() * 35,
          rot: Math.random() * Math.PI
        })),
        clouds: Array.from({ length: 16 }, () => ({
          x: -180 + Math.random() * 360,
          y: -180 + Math.random() * 320,
          len: 35 + Math.random() * 70,
          rot: Math.random() * Math.PI * 2
        }))
      };
    }

    function resetMeteor(meteor, fromRight = true) {
      meteor.r = 12 + Math.random() * 10;
      meteor.x = fromRight ? 930 + Math.random() * 300 : 90 + Math.random() * 760;
      meteor.y = 90 + Math.random() * 920;
      meteor.vx = -(1.4 + Math.random() * 1.8);
      meteor.phase = Math.random() * Math.PI * 2;
      meteor.wobble = 0.02 + Math.random() * 0.035;
      meteor.alive = true;
    }

    function createMeteors() {
      state.meteors = Array.from({ length: 7 }, () => {
        const meteor = {};
        resetMeteor(meteor, false);
        return meteor;
      });
    }

    function shoot() {
      const r = state.rocket;
      if (!hasValidRocketKinematics(r)) return;
      if (state.shootCooldown > 0 || r.crashed) return;
      state.shots.push({
        x: r.x + Math.cos(r.angle) * 20,
        y: r.y + Math.sin(r.angle) * 20,
        vx: r.vx + Math.cos(r.angle) * 8.5,
        vy: r.vy + Math.sin(r.angle) * 8.5,
        life: 1.15
      });
      state.shootCooldown = 0.2;
    }

    function resetGame() {
      state.launched = false;
      state.score = 0;
      state.combo = 1;
      state.mission = 'Launch';
      state.rocket = {
        x: 140,
        y: 1080,
        vx: 0,
        vy: 0,
        angle: -Math.PI / 2,
        fuel: 100,
        landed: false,
        crashed: false
      };
      state.moon = {
        x: 700,
        y: 220,
        r: 56
      };
      state.earth = createEarthTexture();
      state.shots = [];
      state.shootCooldown = 0;
      createPickups();
      createMeteors();
      ui.status.textContent = 'Tap Launch, then fly to the moon. Land gently to win.';
      updateHud();
    }

    function holdButton(id, key) {
      const el = document.getElementById(id);
      const set = (v) => {
        state.controls[key] = v;
        el.classList.toggle('active', v);
      };
      ['pointerdown', 'touchstart'].forEach((eventName) => el.addEventListener(eventName, (e) => { e.preventDefault(); set(true); }));
      ['pointerup', 'pointerleave', 'pointercancel', 'touchend', 'touchcancel'].forEach((eventName) => el.addEventListener(eventName, (e) => { e.preventDefault(); set(false); }));
    }

    holdButton('left', 'left');
    holdButton('right', 'right');

    ui.throttle.addEventListener('input', (e) => {
      setThrottle(Number(e.target.value) / 100);
    });

    document.getElementById('autopilot').addEventListener('click', () => {
      state.autopilot = !state.autopilot;
      document.getElementById('autopilot').textContent = `Autopilot: ${state.autopilot ? 'On' : 'Off'}`;
    });

    document.getElementById('launch').addEventListener('click', () => {
      if (!hasValidRocketKinematics(state.rocket)) return;
      state.launched = true;
      state.mission = 'Collect or Land';
      if (state.rocket.y > 1078) {
        state.rocket.vy = -2;
      }
    });

    document.getElementById('boost').addEventListener('click', () => {
      setThrottle(state.throttle + 0.25);
    });
    document.getElementById('shoot').addEventListener('click', shoot);

    document.getElementById('reset').addEventListener('click', resetGame);

    window.addEventListener('keydown', (e) => {
      if (e.code === 'ArrowLeft') state.controls.left = true;
      if (e.code === 'ArrowRight') state.controls.right = true;
      if (e.code === 'Space') state.launched = true;
      if (e.code === 'KeyX') shoot();
    });
    window.addEventListener('keyup', (e) => {
      if (e.code === 'ArrowLeft') state.controls.left = false;
      if (e.code === 'ArrowRight') state.controls.right = false;
    });

    function physics(dt) {
      const r = state.rocket;
      if (!hasValidRocketKinematics(r)) return;
      if (!hasValidMoonState(state.moon)) return;
      if (dt < MIN_PHYSICS_DT) return;
      state.shootCooldown = Math.max(0, state.shootCooldown - dt);
      if (!state.launched || r.landed || r.crashed) return;

      const g = 0.042;
      const turnSpeed = 0.028;
      const thrustPower = 0.105;

      if (r.fuel > 0) {
        if (state.autopilot) {
          const dx = state.moon.x - r.x;
          const dy = state.moon.y - r.y;
          const targetAngle = Math.atan2(dy, dx);
          let delta = targetAngle - r.angle;
          while (delta > Math.PI) delta -= Math.PI * 2;
          while (delta < -Math.PI) delta += Math.PI * 2;
          r.angle += Math.max(-0.03, Math.min(0.03, delta));

          const dist = Math.hypot(dx, dy);
          setThrottle(dist > 260 ? 0.9 : 0.5);
        } else {
          if (state.controls.left) r.angle -= turnSpeed;
          if (state.controls.right) r.angle += turnSpeed;
        }

        if (state.throttle > 0.02) {
          const t = thrustPower * state.throttle;
          r.vx += Math.cos(r.angle) * t;
          r.vy += Math.sin(r.angle) * t;
          r.fuel = Math.max(0, r.fuel - 0.07 * state.throttle * dt * 60);
        }
      }

      r.vy += g;
      r.vx *= 0.999;
      r.vy *= 0.999;
      r.x += r.vx * dt * 60;
      r.y += r.vy * dt * 60;

      const padY = 1080;
      if (r.y >= padY) {
        r.y = padY;
        if (Math.hypot(r.vx, r.vy) > 3.8 && state.launched) {
          r.crashed = true;
          state.combo = 1;
          ui.status.textContent = 'Crash! Reduce speed before touching down. Tap Reset.';
        } else if (state.launched) {
          r.landed = true;
          state.score += 300;
          ui.status.textContent = 'Safe landing on Earth pad. Try for the Moon next!';
        }
        r.vx = 0;
        r.vy = 0;
      }

      if (r.x < 30) { r.x = 30; r.vx *= -0.25; }
      if (r.x > 870) { r.x = 870; r.vx *= -0.25; }
      if (r.y < 20) { r.y = 20; r.vy *= -0.4; }

      const dx = r.x - state.moon.x;
      const dy = r.y - state.moon.y;
      const moonDist = Math.hypot(dx, dy);
      if (moonDist < state.moon.r + 10) {
        const relSpeed = Math.hypot(r.vx, r.vy);
        if (relSpeed < 2.2) {
          r.landed = true;
          state.launched = false;
          state.mission = 'Mission Complete';
          state.score += 1000 + (state.combo * 100);
          ui.status.textContent = '🎉 Moon landing successful! You nailed it. Reset for a new run.';
        } else {
          r.crashed = true;
          state.combo = 1;
          ui.status.textContent = 'Too fast at moon contact. Slow down and try again.';
        }
        r.vx *= 0.2;
        r.vy *= 0.2;
      }

      for (const pickup of state.pickups) {
        if (pickup.taken) continue;
        const d = Math.hypot(r.x - pickup.x, r.y - pickup.y);
        if (d < pickup.r + 13) {
          pickup.taken = true;
          state.score += 80 * state.combo;
          state.combo = Math.min(8, state.combo + 1);
          r.fuel = Math.min(100, r.fuel + 6);
          ui.status.textContent = `✨ Stellar pickup! Combo x${state.combo}`;
        }
      }

      for (const shot of state.shots) {
        shot.x += shot.vx * dt * 60;
        shot.y += shot.vy * dt * 60;
        shot.life -= dt;
      }
      state.shots = state.shots.filter((shot) => shot.life > 0 && shot.x > -40 && shot.x < 940 && shot.y > -40 && shot.y < 1240);

      for (const meteor of state.meteors) {
        if (!meteor.alive) continue;
        meteor.x += meteor.vx * dt * 60;
        meteor.phase += meteor.wobble * dt * 60;
        meteor.y += Math.sin(meteor.phase) * 0.8;

        if (meteor.x < -40) {
          resetMeteor(meteor, true);
          continue;
        }

        if (Math.hypot(r.x - meteor.x, r.y - meteor.y) < meteor.r + 12) {
          r.crashed = true;
          state.combo = 1;
          state.launched = false;
          ui.status.textContent = 'Meteor impact! Weave around them or shoot through them.';
        }

        for (const shot of state.shots) {
          if (Math.hypot(shot.x - meteor.x, shot.y - meteor.y) < meteor.r + 3) {
            state.score += 120;
            ui.status.textContent = '💥 Meteor destroyed!';
            resetMeteor(meteor, true);
            shot.life = 0;
            break;
          }
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for (const star of state.stars) {
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.fillRect(star.x, star.y, star.s, star.s);
      }

      for (const meteor of state.meteors) {
        if (!meteor.alive) continue;
        const rockGradient = ctx.createRadialGradient(meteor.x - meteor.r * 0.3, meteor.y - meteor.r * 0.3, 2, meteor.x, meteor.y, meteor.r + 2);
        rockGradient.addColorStop(0, '#b58763');
        rockGradient.addColorStop(1, '#5c3f31');
        ctx.fillStyle = rockGradient;
        ctx.beginPath();
        ctx.arc(meteor.x, meteor.y, meteor.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = 'rgba(46, 28, 20, 0.35)';
        ctx.beginPath();
        ctx.arc(meteor.x + meteor.r * 0.25, meteor.y - meteor.r * 0.2, meteor.r * 0.28, 0, Math.PI * 2);
        ctx.arc(meteor.x - meteor.r * 0.2, meteor.y + meteor.r * 0.1, meteor.r * 0.2, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.fillStyle = '#ffd48a';
      for (const shot of state.shots) {
        ctx.fillRect(shot.x - 1.5, shot.y - 1.5, 3, 3);
      }

      for (const pickup of state.pickups) {
        if (pickup.taken) continue;
        pickup.pulse += 0.06;
        const pulse = Math.sin(pickup.pulse) * 2;
        ctx.strokeStyle = 'rgba(73, 210, 255, 0.9)';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(pickup.x, pickup.y, pickup.r + pulse, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = 'rgba(145, 223, 255, 0.25)';
        ctx.beginPath();
        ctx.arc(pickup.x, pickup.y, pickup.r - 2, 0, Math.PI * 2);
        ctx.fill();
      }

      const earth = state.earth;
      ctx.save();
      ctx.translate(earth.x, earth.y);
      ctx.beginPath();
      ctx.arc(0, 0, earth.r, 0, Math.PI * 2);
      ctx.clip();
      const oceanGradient = ctx.createRadialGradient(-40, -80, 40, 0, 0, earth.r + 40);
      oceanGradient.addColorStop(0, '#3ba6ff');
      oceanGradient.addColorStop(0.45, '#1f6db5');
      oceanGradient.addColorStop(1, '#0f345d');
      ctx.fillStyle = oceanGradient;
      ctx.fillRect(-earth.r, -earth.r, earth.r * 2, earth.r * 2);
      for (const band of earth.bands) {
        ctx.fillStyle = `rgba(110, 183, 255, ${band.a.toFixed(3)})`;
        ctx.fillRect(-earth.r, band.y, earth.r * 2, band.h);
      }
      ctx.fillStyle = 'rgba(66, 136, 72, 0.88)';
      for (const c of earth.continents) {
        ctx.save();
        ctx.translate(c.x, c.y);
        ctx.rotate(c.rot);
        ctx.beginPath();
        ctx.ellipse(0, 0, c.rx, c.ry, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      ctx.strokeStyle = 'rgba(255,255,255,0.42)';
      ctx.lineWidth = 3;
      for (const cloud of earth.clouds) {
        ctx.save();
        ctx.translate(cloud.x, cloud.y);
        ctx.rotate(cloud.rot);
        ctx.beginPath();
        ctx.arc(0, 0, cloud.len * 0.5, 0.2, Math.PI - 0.2);
        ctx.stroke();
        ctx.restore();
      }
      ctx.restore();
      ctx.strokeStyle = 'rgba(129, 214, 255, 0.45)';
      ctx.lineWidth = 8;
      ctx.beginPath();
      ctx.arc(earth.x, earth.y, earth.r + 3, 0, Math.PI * 2);
      ctx.stroke();

      ctx.fillStyle = '#7fd0ff';
      ctx.beginPath();
      ctx.arc(state.moon.x, state.moon.y, state.moon.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1c3556';
      ctx.fillText('Moon', state.moon.x - 18, state.moon.y + 4);

      ctx.fillStyle = '#fcfcfc';
      ctx.fillRect(80, 1076, 120, 8);
      ctx.fillStyle = '#ff9447';
      ctx.fillRect(104, 1062, 8, 14);

      const r = state.rocket;
      ctx.save();
      ctx.translate(r.x, r.y);
      ctx.rotate(r.angle + Math.PI / 2);

      ctx.fillStyle = r.crashed ? '#ff6464' : '#ffffff';
      ctx.beginPath();
      ctx.moveTo(0, -22);
      ctx.lineTo(12, 14);
      ctx.lineTo(-12, 14);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = '#68b5ff';
      ctx.fillRect(-4, -4, 8, 8);

      if (state.launched && state.throttle > 0.05 && r.fuel > 0 && !r.crashed) {
        ctx.fillStyle = '#ffb347';
        ctx.beginPath();
        ctx.moveTo(-6, 14);
        ctx.lineTo(0, 14 + Math.random() * 24 + state.throttle * 18);
        ctx.lineTo(6, 14);
        ctx.fill();
      }
      ctx.restore();

      ctx.fillStyle = 'rgba(232,240,255,0.85)';
      ctx.fillText('Florida Launch Pad', 74, 1058);
    }

    function updateHud() {
      const r = state.rocket;
      if (!hasValidRocketKinematics(r)) return;
      const alt = Math.max(0, Math.round((1080 - r.y) * 1.2));
      const speed = Math.round(Math.hypot(r.vx, r.vy) * 24);
      ui.altitude.textContent = `${alt} km`;
      ui.speed.textContent = `${speed} m/s`;
      ui.fuel.textContent = `${Math.round(r.fuel)}%`;
      ui.score.textContent = `${Math.round(state.score)} (x${state.combo})`;
      ui.objective.textContent = state.mission;
      if (r.crashed) ui.mode.textContent = 'Crashed';
      else if (r.landed && !state.launched) ui.mode.textContent = 'Landed';
      else if (state.autopilot) ui.mode.textContent = 'Autopilot';
      else if (state.launched) ui.mode.textContent = 'Manual';
      else ui.mode.textContent = 'Ready';
    }

    let last = performance.now();
    function tick(now) {
      const rawDt = (now - last) / 1000;
      const dt = clampFrameTime(rawDt);
      last = now;
      physics(dt);
      draw();
      updateHud();
      requestAnimationFrame(tick);
    }

    resetGame();
    requestAnimationFrame(tick);
  </script>
</body>
</html>
